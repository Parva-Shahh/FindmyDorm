<!-- Container adds horizontal padding and vertical spacing -->
<div class="container py-4 text-center">

    <!-- Row centres the main image horizontally -->
    <div class="row justify-content-center">

        <!--
        Column controls image width responsively:
        col-10  → almost full width on small screens
        col-md-6 → half width on medium screens
        col-lg-4 → smaller width on large screens
        This keeps the hero section compact.
        -->
        <div class="col-10 col-md-6 col-lg-4">

            <!--
            Main display image.
            img-fluid → responsive scaling
            rounded → soft corners
            shadow → subtle depth
            mb-3 → spacing below image
            -->
            <img id="mainImage"
                 src="{{ url_for('static', filename='assets/img/' + lang_code + '/image1.jpg') }}"
                 class="img-fluid rounded shadow mb-3"
                 alt="Main image">
        </div>
    </div>

    <!--
    Thumbnail selector row:
    d-flex → horizontal layout
    justify-content-center → centred thumbnails
    gap-2 → spacing between thumbnails
    -->
    <div class="d-flex justify-content-center gap-2">

        <!--
        Each thumbnail:
        img-thumbnail → Bootstrap bordered style
        width:70px → controlled small size
        cursor:pointer → indicates clickable
        onclick → updates main image
        -->
        <img src="{{ url_for('static', filename='assets/img/' + lang_code + '/image1.jpg') }}"
             class="img-thumbnail"
             style="width:70px; cursor:pointer;"
             alt="Thumbnail 1"
             onclick="changeImage(this.src)">

        <img src="{{ url_for('static', filename='assets/img/' + lang_code + '/image2.jpg') }}"
             class="img-thumbnail"
             style="width:70px; cursor:pointer;"
             alt="Thumbnail 2"
             onclick="changeImage(this.src)">

        <img src="{{ url_for('static', filename='assets/img/' + lang_code + '/image3.jpg') }}"
             class="img-thumbnail"
             alt="Thumbnail 3"
             style="width:70px; cursor:pointer;"
             onclick="changeImage(this.src)">
    </div>

</div>

<!--
JavaScript function:
Changes the main image source when a thumbnail is clicked.
This avoids reloading the page.
-->
<script>
function changeImage(src) {
    document.getElementById("mainImage").src = src;
}
</script>
