<!--
Hero Carousel Section
This acts as a controlled-height hero area.
container-fluid ensures full width across the page.
-->
<div class="container-fluid px-0">

    <!--
    Carousel wrapper
    carousel-fade → smooth crossfade transition
    data-bs-ride="carousel" → auto-start
    data-bs-interval="2000" → 2 seconds per slide
    -->
    <div id="localeCarousel"
         class="carousel slide carousel-fade"
         data-bs-ride="carousel"
         data-bs-interval="2000">

        <!-- Slide indicators (bottom dots) -->
        <div class="carousel-indicators">
            <button type="button"
                    data-bs-target="#localeCarousel"
                    data-bs-slide-to="0"
                    class="active"></button>

            <button type="button"
                    data-bs-target="#localeCarousel"
                    data-bs-slide-to="1"></button>

            <button type="button"
                    data-bs-target="#localeCarousel"
                    data-bs-slide-to="2"></button>
        </div>

        <!-- Carousel slides container -->
        <div class="carousel-inner">

            <!-- Slide 1 -->
            <div class="carousel-item active">
                <img src="{{ url_for('static', filename='assets/img/' + lang_code + '/image1.jpg') }}"
                     class="d-block w-100 hero-image"
                     alt="Image 1">
            </div>

            <!-- Slide 2 -->
            <div class="carousel-item">
                <img src="{{ url_for('static', filename='assets/img/' + lang_code + '/image2.jpg') }}"
                     class="d-block w-100 hero-image"
                     alt="Image 2">
            </div>

            <!-- Slide 3 -->
            <div class="carousel-item">
                <img src="{{ url_for('static', filename='assets/img/' + lang_code + '/image3.jpg') }}"
                     class="d-block w-100 hero-image"
                     alt="Image 3">
            </div>

        </div>

        <!-- Navigation controls (left/right arrows) -->
        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#localeCarousel"
                data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next"
                type="button"
                data-bs-target="#localeCarousel"
                data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
</div>

<!--
Hero sizing styles
max-height controls vertical size
object-fit: cover ensures clean cropping without distortion
-->
<style>
.hero-image {
    max-height: 400px;   /* Adjust hero height here */
    object-fit: cover;   /* Crop rather than stretch */
}
</style>
