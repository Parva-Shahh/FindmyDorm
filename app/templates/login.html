{% extends "base.html" %}

{% block main %}
<section class="page-section">
    <div class="container">
        <div class="bg-faded p-5 rounded">
            <h2 class="section-heading mb-4"><span class="section-heading-lower">{{ _('Log In') }}</span></h2>

            <div class="row">
                {% if lang_code == 'de' %}
                <div class="col-md-4 order-md-2 mb-3">
                    <div class="border p-3 text-center rounded border-primary bg-white shadow-sm">
                        <p class="fw-bold mb-1">SCHRITT 1 VON 3</p>
                        <div class="progress" style="height: 10px;"><div class="progress-bar w-33"></div></div>
                    </div>
                </div>
                {% endif %}

                <div class="{% if lang_code == 'de' %}col-md-8{% else %}col-12{% endif %}">
                    <form>
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ _('Email Address') }}</label>
                            <input type="email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ _('Password') }}</label>
                            <input type="password" class="form-control">
                        </div>
                        <button class="btn btn-primary w-100">{{ _('Sign In') }}</button>
                    </form>

                    <p class="mt-3 text-center small">
                        New here? <a href="#" class="text-primary fw-bold">Create account</a>
                    </p>
                </div>
            </div>

            {% if lang_code == 'cn' %}
            <div class="mt-4 p-4 border rounded bg-white text-center shadow-sm">
                <h4 class="fw-bold text-primary">加入 10,000+ 名学生！</h4>
                <p>Be part of our community.</p>
            </div>
            {% endif %}
        </div>
    </div>
</section>
{% endblock %}
