{% extends "base.html" %}
{% block main %}
<section class="page-section">
    <div class="container">
        <div class="product-item">
            <div class="product-item-title d-flex">
                <div class="bg-faded p-5 d-flex ms-auto rounded">
                    <h2 class="section-heading mb-0">
                        <span class="section-heading-upper">FindMyDorm</span>
                        <span class="section-heading-lower">{{ _('Log In') }}</span>
                    </h2>
                </div>
            </div>

            <div class="product-item-description d-flex me-auto">
                <div class="bg-faded p-5 rounded w-100">
                    <div class="mb-4 text-end">
                        <small class="text-uppercase fw-bold">Change Language:</small>
                        <div class="btn-group btn-group-sm" role="group">
                            <a href="{{ url_for('set_language', lang_code='en') }}" class="btn btn-outline-primary">English</a>
                            <a href="{{ url_for('set_language', lang_code='cn') }}" class="btn btn-outline-primary">中文 (CN)</a>
                            <a href="{{ url_for('set_language', lang_code='de') }}" class="btn btn-outline-primary">Deutsch (DE)</a>
                        </div>
                    </div>

                    <form>
                        <div class="row gx-0">
                            {% if lang_code == 'de' %}
                            <div class="col-md-4 order-md-2 mb-3">
                                <div class="border p-3 text-center rounded bg-light">
                                    <h5 class="fw-bold">STEP 1 OF 3</h5>
                                    <div class="progress mb-2">
                                        <div class="progress-bar w-33" role="progressbar"></div>
                                    </div>
                                    <p class="small text-muted">Account Details</p>
                                </div>
                            </div>
                            {% endif %}

                            <div class="{% if lang_code == 'de' %}col-md-8 order-md-1{% else %}col-12{% endif %}">
                                <div class="mb-3">
                                    <label class="form-label">Email Field</label>
                                    <input type="email" class="form-control" placeholder="Enter email">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password Field</label>
                                    <input type="password" class="form-control" placeholder="Enter password">
                                </div>
                                <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
                                <p class="text-center"><a href="#">New Here? Create Account</a></p>
                            </div>
                        </div>

                        {% if lang_code == 'cn' %}
                        <div class="mt-4 p-4 border rounded bg-light text-center">
                            <div class="d-flex justify-content-center mb-2">
                                <div class="rounded-circle bg-secondary mx-1" style="width: 40px; height: 40px;"></div>
                                <div class="rounded-circle bg-secondary mx-1" style="width: 40px; height: 40px;"></div>
                                <div class="rounded-circle bg-secondary mx-1" style="width: 40px; height: 40px;"></div>
                                <div class="rounded-circle bg-secondary mx-1" style="width: 40px; height: 40px;"></div>
                            </div>
                            <h4 class="fw-bold text-primary">JOIN 10,000+ STUDENTS!</h4>
                        </div>
                        {% endif %}
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
